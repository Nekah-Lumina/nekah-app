<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <!-- Universal Device Compatibility Meta Tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    
    <!-- SEO and App Information -->
    <title>NEKAH - Maternal Health Platform</title>
    <meta name="description" content="Comprehensive maternal health application with AI-powered pregnancy support, health tracking, and expert consultations." />
    <meta name="keywords" content="pregnancy, maternal health, AI health analysis, pregnancy tracking, prenatal care" />
    <meta name="author" content="NEKAH Team" />
    
    <!-- Mobile Web App Configuration -->
    <meta name="theme-color" content="#4FD1C7" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-status-bar-style" content="default" />
    <meta name="mobile-web-app-title" content="NEKAH" />
    
    <!-- Apple iOS Configuration -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="NEKAH" />
    <meta name="apple-touch-fullscreen" content="yes" />
    
    <!-- Microsoft Windows Configuration -->
    <meta name="msapplication-TileColor" content="#4FD1C7" />
    
    <!-- Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
    
    <!-- Open Graph Meta Tags for Social Sharing -->
    <meta property="og:title" content="NEKAH - Maternal Health Platform" />
    <meta property="og:description" content="AI-powered pregnancy support with health tracking and expert consultations" />
    <meta property="og:type" content="website" />
    
    <!-- Progressive Web App Manifest -->
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- This is a replit script which adds a banner on the top of the page when opened in development mode outside the replit environment -->
    <script type="text/javascript" src="https://replit.com/public/js/replit-dev-banner.js"></script>
  </body>
</html>
